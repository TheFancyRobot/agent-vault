name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify npm publish access
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          npm ping --registry https://registry.npmjs.org >/dev/null
          npm_user="$(npm whoami --registry https://registry.npmjs.org)"
          package_name="$(node -p "require('./package.json').name")"
          package_scope="${package_name%%/*}"

          echo "Authenticated to npm as ${npm_user}"
          echo "Release package is ${package_name}"

          if [[ "${package_scope}" == @* && "${package_scope#@}" != "${npm_user}" ]]; then
            scope_name="${package_scope#@}"
            if ! npm org ls "${scope_name}" >/dev/null 2>&1; then
              echo "::error::NPM token authenticated as '${npm_user}', but could not verify access to npm scope '@${scope_name}'. Ensure the scope exists and this npm account has publish access."
              exit 1
            fi

            echo "Verified access to npm org @${scope_name}"
          fi

      - name: Create release PR or publish release
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
          commit: "chore: version packages"
          title: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
