name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_version:
        description: "Skip version bump (publish current version as-is)"
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure npm publishing authentication
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          package_name="$(node -p "require('./package.json').name")"
          echo "Release package is ${package_name}"

          if [[ -n "${NODE_AUTH_TOKEN}" ]]; then
            npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
            npm ping --registry https://registry.npmjs.org >/dev/null
            npm_user="$(npm whoami --registry https://registry.npmjs.org)"

            echo "Authenticated to npm as ${npm_user}"
            echo "Package-level publish access will be verified by npm during changeset publish."
          else
            npm_version="$(npm --version)"
            echo "No NPM_TOKEN secret configured; using npm trusted publishing via GitHub OIDC."
            echo "npm ${npm_version}"
            node -e "const semver = process.argv[1].split('.').map(Number); if (semver[0] < 11 || (semver[0] === 11 && semver[1] < 5) || (semver[0] === 11 && semver[1] === 5 && semver[2] < 1)) { console.error('npm trusted publishing requires npm >= 11.5.1'); process.exit(1); }" "$npm_version"
            echo "Ensure npmjs.com has a trusted publisher configured for TheFancyRobot/agent-vault, workflow .github/workflows/release.yml, branch main."
          fi

      - name: Create release PR or publish release
        if: ${{ github.event_name == 'push' || !inputs.skip_version }}
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
          commit: "chore: version packages"
          title: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish release (skip version bump)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_version }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run release

      - name: Create git tag and GitHub release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          package_name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          tag="${package_name}@${version}"

          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists, skipping."
            exit 0
          fi

          git tag "${tag}"
          git push origin "${tag}"
          gh release create "${tag}" --title "${tag}" --generate-notes
